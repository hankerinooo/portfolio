<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Henry Davis is a UX designer who creates clear, accessible digital products.">
  <title>Henry Davis &mdash; UX Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #FAF8F5; --ink: #1C1917; --ink-mid: rgba(28,25,23,0.5); }
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) { --bg: #1A1612; --ink: #EDE8E0; --ink-mid: rgba(237,232,224,0.5); }
    }
    html[data-theme="dark"] { --bg: #1A1612; --ink: #EDE8E0; --ink-mid: rgba(237,232,224,0.5); }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Jost', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
      line-height: 1.65;
      font-size: 1.0625rem;
    }
    h1, h2, h3, h4 { font-family: 'Fraunces', Georgia, serif; font-weight: 400; font-optical-sizing: auto; line-height: 1.1; letter-spacing: -0.025em; }
    h1 { font-size: clamp(3.5rem, 10vw, 6rem); margin-top: 0; margin-bottom: 0.5rem; text-rendering: optimizeLegibility; font-kerning: normal; letter-spacing: -0.03em; }
    .skip-link { position: absolute; top: -4rem; left: 0; }
    .skip-link:focus { top: 0; }
    :focus-visible { outline: 3px solid var(--ink); outline-offset: 3px; }
    a { color: var(--ink); }
    a:visited { color: var(--ink); }
    hr { border: none; margin: 3rem 0; }
    header + hr { margin-top: 2rem; }
    main + hr { margin-bottom: 1.5rem; }
    footer p { margin: 0; }
    .meta { opacity: 0.5; font-size: 0.875rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
    nav[aria-label="Selected work"] a {
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
      display: block;
      padding-block: 1rem;
      transition: opacity 0.15s;
    }
    nav[aria-label="Selected work"] a:visited { color: var(--ink); }
    nav[aria-label="Selected work"] a:hover { opacity: 0.45; }
    .theme-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: transparent;
      border: 1px solid var(--ink-mid);
      border-radius: 2rem;
      padding: 0.35rem 0.85rem;
      font: 0.6875rem/1 'Jost', system-ui, sans-serif;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      z-index: 200;
      opacity: 0.4;
      transition: opacity 0.15s;
    }
    .theme-toggle:hover { opacity: 1; }
    .copy-email {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      vertical-align: middle;
    }
    .copy-email:hover { text-decoration: underline; }
    .copy-email .icon-check { display: none; }
    .copy-email.copied .icon-copy { display: none; }
    .copy-email.copied .icon-check { display: inline; }
    @media (max-width: 640px) {
      body { padding: 1.75rem 1.25rem 2.5rem; }
      hr { margin: 1.75rem 0; }
      header + hr { margin-top: 1.25rem; }
      nav[aria-label="Selected work"] a { padding-block: 0.55rem; }
    }
  </style>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to main content</a>

  <header>
    <h1>Henry Davis</h1>
    <p class="meta">UX Designer &mdash; [City] &mdash; <button class="copy-email" aria-label="Copy email address"><svg class="icon-copy" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg class="icon-check" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg><span class="copy-label">Copy email</span></button></p>
  </header>

  <hr>

  <main id="main">

    <nav aria-label="Selected work">
      <p>
        <a href="#">Project One &mdash; Placeholder Company</a><br>
        <a href="#">Project Two &mdash; Placeholder Company</a><br>
        <a href="#">Project Three &mdash; Placeholder Company</a>
      </p>
    </nav>

    <hr>

    <nav aria-label="Contact">
      <p>
        <a href="https://linkedin.com/in/henrydavis">linkedin.com/in/henrydavis</a><br>
        <a href="#">Resume (PDF)</a>
      </p>
    </nav>

  </main>

  <hr>

  <footer>
    <p><small>&copy; 2026 Henry Davis</small></p>
  </footer>

  <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">Dark</button>
  <script>
    (function(){
      var root=document.documentElement,btn=document.getElementById('theme-toggle');
      function update(){
        var dark=root.getAttribute('data-theme')==='dark'||
          (!root.getAttribute('data-theme')&&window.matchMedia('(prefers-color-scheme: dark)').matches);
        btn.textContent=dark?'Light':'Dark';
        btn.setAttribute('aria-label',dark?'Switch to light mode':'Switch to dark mode');
      }
      update();
      btn.addEventListener('click',function(){
        var cur=root.getAttribute('data-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
        var next=cur==='dark'?'light':'dark';
        root.setAttribute('data-theme',next);
        localStorage.setItem('theme',next);
        update();
      });
    })();
    (function(){
      var eb=document.querySelector('.copy-email');
      if(!eb)return;
      eb.addEventListener('click',function(){
        navigator.clipboard.writeText('davish52@gmail.com').then(function(){
          eb.classList.add('copied');
          eb.querySelector('.copy-label').textContent='Copied';
          setTimeout(function(){
            eb.classList.remove('copied');
            eb.querySelector('.copy-label').textContent='Copy email';
          },2000);
        });
      });
    })();
  </script>

</body>
</html>
